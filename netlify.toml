[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"

# data-overrides.json ve admin-config.json her seferinde taze çekilsin
[[headers]]
  for = "/data-overrides.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/admin-config.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
